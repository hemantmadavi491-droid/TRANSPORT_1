{% extends 'base.html' %}

{% block content %}

<div class="page-header">
    <h2>👥 Customer Management</h2>
</div>

<div class="table-container">

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Mobile</th>
                <th>Address</th>
            </tr>
        </thead>

        <tbody>

            {% for customer in customers %}
            <tr>
                <td>{{ customer.id }}</td>
                <td>{{ customer.name }}</td>
                <td>{{ customer.mobile }}</td>
                <td>{{ customer.address }}</td>
            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
