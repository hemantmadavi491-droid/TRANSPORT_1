{% extends 'base.html' %}

{% block content %}

<div class="page-header">
    <h2>🛣️ Trip Management</h2>
</div>

<div class="table-container">

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Source</th>
                <th>Destination</th>
                <th>Amount</th>
            </tr>
        </thead>

        <tbody>

            {% for trip in trips %}
            <tr>
                <td>{{ trip.id }}</td>
                <td>{{ trip.source }}</td>
                <td>{{ trip.destination }}</td>
                <td>₹{{ trip.amount }}</td>
            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
