<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h2>Reset Password</h2>

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

            <input type="password"
                   name="new_password"
                   placeholder="New Password"
                   required>

            <button type="submit">
                Update Password
            </button>

        </form>

        <br>

        <p style="color:#38bdf8;">
            {{ message }}
        </p>

        <a href="{{ url_for('login') }}">
            Back To Login
        </a>

    </div>

</div>

</body>
</html>
