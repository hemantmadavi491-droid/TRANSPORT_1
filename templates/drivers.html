{% extends "base.html" %}

{% block content %}

<h2 class="page-title">
    👨‍✈️ Driver Management
</h2>

<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Driver Name</th>
            <th>Mobile Number</th>
            <th>License Number</th>
        </tr>
    </thead>

    <tbody>
        {% for driver in drivers %}
        <tr>
            <td>{{ driver.id }}</td>
            <td>{{ driver.name }}</td>
            <td>{{ driver.mobile }}</td>
            <td>{{ driver.license_no }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
