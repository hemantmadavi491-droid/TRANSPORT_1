{% extends 'base.html' %}

{% block content %}

<div class="page-header">
    <h2>👨‍✈️ Driver Management</h2>
</div>

<div class="table-container">

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Mobile</th>
                <th>License Number</th>
            </tr>
        </thead>

        <tbody>

            {% for driver in drivers %}
            <tr>
                <td>{{ driver.id }}</td>
                <td>{{ driver.name }}</td>
                <td>{{ driver.mobile }}</td>
                <td>{{ driver.license_no }}</td>
            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
